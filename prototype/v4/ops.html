<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>xRag Prototype v4 | 评估与运维板</title>
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body data-page="ops">
    <div class="shell">
      <header class="topbar" data-global-header></header>

      <main class="page-grid">
        <section class="hero-card hero-card--ops">
          <p class="eyebrow">评估与运维板</p>
          <h2 class="hero-title">把 retrieval、citation、refusal、latency 和 cost 放在同一块板上看。</h2>
          <p class="hero-copy">
            `Phase 2A` 的运维板不只看服务是否活着，还要看答案是否可信、引用是否完整、拒答是否正确、模型成本是否可控。
          </p>
        </section>

        <section class="metric-grid" data-ops-metrics></section>

        <section class="two-column">
          <article class="panel">
            <div class="panel-header">
              <div>
                <p class="eyebrow">服务健康</p>
                <h3 class="section-title">Provider / Index / API 健康</h3>
              </div>
            </div>
            <div class="service-grid" data-service-health></div>
          </article>

          <aside class="panel">
            <div class="panel-header">
              <div>
                <p class="eyebrow">回滚</p>
                <h3 class="section-title">降级与 rollout 基线</h3>
              </div>
            </div>
            <div data-rollback-panel></div>
          </aside>
        </section>

        <section class="two-column">
          <article class="panel">
            <div class="panel-header">
              <div>
                <p class="eyebrow">失败会话</p>
                <h3 class="section-title">最近失败 / 拒答 / stale 事件</h3>
              </div>
            </div>
            <div class="list-shell" data-incident-list></div>
          </article>

          <aside class="panel">
            <div class="panel-header">
              <div>
                <p class="eyebrow">推荐动作</p>
                <h3 class="section-title">评估与运维建议</h3>
              </div>
            </div>
            <ul class="note-list" data-ops-actions></ul>
          </aside>
        </section>
      </main>
    </div>

    <script src="assets/js/data.js"></script>
    <script src="assets/js/ui.js"></script>
    <script src="assets/js/ops.js"></script>
  </body>
</html>
