name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Enable Corepack
        run: corepack enable

      - name: Validate
        run: scripts/ci-validate.sh

  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Run API integration tests
        run: scripts/run-api-integration.sh

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: corepack pnpm --filter @xrag/web exec playwright install --with-deps chromium

      - name: Run smoke E2E
        run: scripts/run-e2e-smoke.sh

  infra:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate compose config
        run: scripts/compose-config.sh

      - name: Start infra stack
        run: |
          docker compose up -d --wait postgres redis
          docker compose up -d minio

      - name: Check infra readiness
        run: scripts/infra-check.sh

      - name: Show infra status
        run: docker compose ps

      - name: Tear down infra stack
        if: always()
        run: docker compose down -v --remove-orphans

  build-images:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    needs: [validate, integration, e2e, infra]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: production
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - service: api
            image_name: xrag-api
            dockerfile: deploy/docker/api.Dockerfile
          - service: worker
            image_name: xrag-worker
            dockerfile: deploy/docker/worker.Dockerfile
          - service: web
            image_name: xrag-web
            dockerfile: deploy/docker/web.Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Log in to registry with retry
        env:
          REGISTRY_HOST: ${{ secrets.REGISTRY_HOST }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          attempts=5
          for attempt in $(seq 1 "$attempts"); do
            if printf '%s' "$REGISTRY_PASSWORD" | docker login "$REGISTRY_HOST" -u "$REGISTRY_USERNAME" --password-stdin; then
              exit 0
            fi

            if [[ "$attempt" -eq "$attempts" ]]; then
              echo "Registry login failed after ${attempts} attempts." >&2
              exit 1
            fi

            sleep_seconds=$((attempt * 5))
            echo "Registry login failed on attempt ${attempt}/${attempts}, retrying in ${sleep_seconds}s..."
            sleep "$sleep_seconds"
          done

      - name: Build and push ${{ matrix.service }} with retry
        env:
          IMAGE_TAG: ${{ secrets.REGISTRY_HOST }}/${{ secrets.REGISTRY_NAMESPACE }}/${{ matrix.image_name }}:${{ github.sha }}
          DOCKERFILE: ${{ matrix.dockerfile }}
        run: |
          attempts=3
          for attempt in $(seq 1 "$attempts"); do
            if docker buildx build \
              --file "$DOCKERFILE" \
              --tag "$IMAGE_TAG" \
              --push \
              --provenance=false \
              .; then
              exit 0
            fi

            if [[ "$attempt" -eq "$attempts" ]]; then
              echo "Build/push failed after ${attempts} attempts." >&2
              exit 1
            fi

            sleep_seconds=$((attempt * 20))
            echo "Build/push failed on attempt ${attempt}/${attempts}, retrying in ${sleep_seconds}s..."
            sleep "$sleep_seconds"
          done

  deploy-staging:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    needs: build-images
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: staging
    outputs:
      deploy_enabled: ${{ steps.staging-preflight.outputs.enabled }}
      deployed_at: ${{ steps.deploy-staging-ssh.outputs.deployed_at }}
      previous_api_image: ${{ steps.deploy-staging-ssh.outputs.previous_api_image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check staging deploy secrets
        id: staging-preflight
        run: |
          if [[ -z "${{ secrets.SSH_HOST }}" || -z "${{ secrets.SSH_USER }}" || -z "${{ secrets.SSH_PRIVATE_KEY }}" || -z "${{ secrets.DEPLOY_PATH }}" || -z "${{ secrets.DEPLOY_ENV_FILE }}" || -z "${{ secrets.REGISTRY_HOST }}" || -z "${{ secrets.REGISTRY_USERNAME }}" || -z "${{ secrets.REGISTRY_PASSWORD }}" || -z "${{ secrets.REGISTRY_NAMESPACE }}" ]]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Staging deploy secrets are missing; skipping deploy."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy staging over SSH
        id: deploy-staging-ssh
        if: ${{ steps.staging-preflight.outputs.enabled == 'true' }}
        env:
          DEPLOY_ENVIRONMENT: staging
          DEPLOY_ENV_FILE: ${{ secrets.DEPLOY_ENV_FILE }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          REGISTRY_HOST: ${{ secrets.REGISTRY_HOST }}
          REGISTRY_NAMESPACE: ${{ secrets.REGISTRY_NAMESPACE }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_USER: ${{ secrets.SSH_USER }}
          XRAG_API_IMAGE: ${{ secrets.REGISTRY_HOST }}/${{ secrets.REGISTRY_NAMESPACE }}/xrag-api:${{ github.sha }}
          XRAG_IMAGE_TAG: ${{ github.sha }}
          XRAG_WEB_IMAGE: ${{ secrets.REGISTRY_HOST }}/${{ secrets.REGISTRY_NAMESPACE }}/xrag-web:${{ github.sha }}
          XRAG_WORKER_IMAGE: ${{ secrets.REGISTRY_HOST }}/${{ secrets.REGISTRY_NAMESPACE }}/xrag-worker:${{ github.sha }}
        run: scripts/gh-deploy-ssh.sh

  smoke-staging:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    needs: deploy-staging
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Check staging smoke target
        id: staging-smoke-preflight
        run: |
          if [[ -z "${{ secrets.APP_BASE_URL }}" ]]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Staging APP_BASE_URL is missing; skipping smoke."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run staging smoke
        if: ${{ steps.staging-smoke-preflight.outputs.enabled == 'true' }}
        run: scripts/smoke-http.sh "${{ secrets.APP_BASE_URL }}"

      - name: Record staging smoke evidence
        if: always()
        env:
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          ARTIFACT_DIR: artifacts/deploy-evidence/staging
          DEPLOY_ENVIRONMENT: staging
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SHA: ${{ github.sha }}
          XRAG_API_IMAGE: ${{ secrets.REGISTRY_HOST }}/${{ secrets.REGISTRY_NAMESPACE }}/xrag-api:${{ github.sha }}
          XRAG_PREVIOUS_API_IMAGE: ${{ needs.deploy-staging.outputs.previous_api_image }}
          XRAG_DEPLOYED_AT: ${{ needs.deploy-staging.outputs.deployed_at }}
          XRAG_SMOKE_EXECUTED: ${{ steps.staging-smoke-preflight.outputs.enabled }}
          XRAG_SMOKE_STATUS: ${{ job.status }}
        run: scripts/record-deploy-evidence.sh

      - name: Enable Corepack for deployment record persistence
        if: ${{ always() && needs.deploy-staging.outputs.deploy_enabled == 'true' }}
        run: corepack enable

      - name: Install dependencies for deployment record persistence
        if: ${{ always() && needs.deploy-staging.outputs.deploy_enabled == 'true' }}
        run: pnpm install --frozen-lockfile

      - name: Persist staging deployment record
        if: ${{ always() && needs.deploy-staging.outputs.deploy_enabled == 'true' }}
        env:
          DEPLOY_EVIDENCE_JSON: artifacts/deploy-evidence/staging/evidence.json
          DEPLOY_ENVIRONMENT: staging
          DEPLOY_ENV_FILE: ${{ secrets.DEPLOY_ENV_FILE }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: node scripts/write-deployment-record.mjs

      - name: Upload staging smoke evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-evidence-staging-${{ github.run_id }}
          path: artifacts/deploy-evidence/staging
          if-no-files-found: error

  deploy-production:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    needs: smoke-staging
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: production
    outputs:
      deploy_enabled: ${{ steps.production-preflight.outputs.enabled }}
      deployed_at: ${{ steps.deploy-production-ssh.outputs.deployed_at }}
      previous_api_image: ${{ steps.deploy-production-ssh.outputs.previous_api_image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check production deploy secrets
        id: production-preflight
        run: |
          if [[ -z "${{ secrets.SSH_HOST }}" || -z "${{ secrets.SSH_USER }}" || -z "${{ secrets.SSH_PRIVATE_KEY }}" || -z "${{ secrets.DEPLOY_PATH }}" || -z "${{ secrets.DEPLOY_ENV_FILE }}" || -z "${{ secrets.REGISTRY_HOST }}" || -z "${{ secrets.REGISTRY_USERNAME }}" || -z "${{ secrets.REGISTRY_PASSWORD }}" || -z "${{ secrets.REGISTRY_NAMESPACE }}" ]]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Production deploy secrets are missing; skipping deploy."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy production over SSH
        id: deploy-production-ssh
        if: ${{ steps.production-preflight.outputs.enabled == 'true' }}
        env:
          DEPLOY_ENVIRONMENT: production
          DEPLOY_ENV_FILE: ${{ secrets.DEPLOY_ENV_FILE }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          REGISTRY_HOST: ${{ secrets.REGISTRY_HOST }}
          REGISTRY_NAMESPACE: ${{ secrets.REGISTRY_NAMESPACE }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_USER: ${{ secrets.SSH_USER }}
          XRAG_API_IMAGE: ${{ secrets.REGISTRY_HOST }}/${{ secrets.REGISTRY_NAMESPACE }}/xrag-api:${{ github.sha }}
          XRAG_IMAGE_TAG: ${{ github.sha }}
          XRAG_WEB_IMAGE: ${{ secrets.REGISTRY_HOST }}/${{ secrets.REGISTRY_NAMESPACE }}/xrag-web:${{ github.sha }}
          XRAG_WORKER_IMAGE: ${{ secrets.REGISTRY_HOST }}/${{ secrets.REGISTRY_NAMESPACE }}/xrag-worker:${{ github.sha }}
        run: scripts/gh-deploy-ssh.sh

  smoke-production:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    needs: deploy-production
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Check production smoke target
        id: production-smoke-preflight
        run: |
          if [[ -z "${{ secrets.APP_BASE_URL }}" ]]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Production APP_BASE_URL is missing; skipping smoke."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run production smoke
        if: ${{ steps.production-smoke-preflight.outputs.enabled == 'true' }}
        run: scripts/smoke-http.sh "${{ secrets.APP_BASE_URL }}"

      - name: Record production smoke evidence
        if: always()
        env:
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          ARTIFACT_DIR: artifacts/deploy-evidence/production
          DEPLOY_ENVIRONMENT: production
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SHA: ${{ github.sha }}
          XRAG_API_IMAGE: ${{ secrets.REGISTRY_HOST }}/${{ secrets.REGISTRY_NAMESPACE }}/xrag-api:${{ github.sha }}
          XRAG_PREVIOUS_API_IMAGE: ${{ needs.deploy-production.outputs.previous_api_image }}
          XRAG_DEPLOYED_AT: ${{ needs.deploy-production.outputs.deployed_at }}
          XRAG_SMOKE_EXECUTED: ${{ steps.production-smoke-preflight.outputs.enabled }}
          XRAG_SMOKE_STATUS: ${{ job.status }}
        run: scripts/record-deploy-evidence.sh

      - name: Enable Corepack for deployment record persistence
        if: ${{ always() && needs.deploy-production.outputs.deploy_enabled == 'true' }}
        run: corepack enable

      - name: Install dependencies for deployment record persistence
        if: ${{ always() && needs.deploy-production.outputs.deploy_enabled == 'true' }}
        run: pnpm install --frozen-lockfile

      - name: Persist production deployment record
        if: ${{ always() && needs.deploy-production.outputs.deploy_enabled == 'true' }}
        env:
          DEPLOY_EVIDENCE_JSON: artifacts/deploy-evidence/production/evidence.json
          DEPLOY_ENVIRONMENT: production
          DEPLOY_ENV_FILE: ${{ secrets.DEPLOY_ENV_FILE }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: node scripts/write-deployment-record.mjs

      - name: Upload production smoke evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-evidence-production-${{ github.run_id }}
          path: artifacts/deploy-evidence/production
          if-no-files-found: error
