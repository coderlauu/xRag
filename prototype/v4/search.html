<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>xRag Prototype v4 | 检索实验台</title>
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body data-page="search">
    <div class="shell">
      <header class="topbar" data-global-header></header>

      <main class="page-grid">
        <section class="hero-card">
          <p class="eyebrow">检索实验台</p>
          <h2 class="hero-title">不是只看命中列表，而是看 lexical、semantic 和 rerank 各自贡献了什么。</h2>
          <p class="hero-copy">
            `Phase 2A` 的检索页同时服务产品设计和技术实现。它要解释：哪些文档被召回、为什么被召回、为什么被引用、为什么有些结果没进答案。
          </p>
        </section>

        <section class="panel">
          <form class="toolbar-grid" id="search-form">
            <input id="search-input" type="search" placeholder="例如：五月最值得投入的能力是什么？" />
            <select id="filter-mode">
              <option value="all">全部检索模式</option>
              <option value="keyword">Keyword</option>
              <option value="semantic">Semantic</option>
              <option value="hybrid">Hybrid</option>
            </select>
            <select id="filter-source">
              <option value="all">全部来源</option>
              <option value="pdf">PDF</option>
              <option value="link">链接</option>
              <option value="text">文本</option>
            </select>
            <select id="filter-index-status">
              <option value="all">全部索引状态</option>
              <option value="ready">Ready</option>
              <option value="stale">Stale</option>
              <option value="failed">Failed</option>
            </select>
            <button class="primary-button" type="submit">刷新结果</button>
          </form>
        </section>

        <section class="two-column">
          <article class="panel">
            <div class="panel-header">
              <div>
                <p class="eyebrow">召回结果</p>
                <h3 class="section-title">当前 retrieval trace</h3>
              </div>
              <span class="inline-note" data-result-count></span>
            </div>
            <div class="list-shell" data-search-results></div>
          </article>

          <aside class="panel">
            <div class="panel-header">
              <div>
                <p class="eyebrow">检索建议</p>
                <h3 class="section-title">当前问题与检索解释</h3>
              </div>
            </div>
            <div data-search-insights></div>
          </aside>
        </section>
      </main>
    </div>

    <script src="assets/js/data.js"></script>
    <script src="assets/js/ui.js"></script>
    <script src="assets/js/search.js"></script>
  </body>
</html>
