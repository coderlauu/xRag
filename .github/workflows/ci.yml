name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.7.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Validate
        run: scripts/ci-validate.sh

  infra:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate compose config
        run: scripts/compose-config.sh

      - name: Start infra stack
        run: |
          docker compose up -d --wait postgres redis
          docker compose up -d minio

      - name: Check infra readiness
        run: scripts/infra-check.sh

      - name: Show infra status
        run: docker compose ps

      - name: Tear down infra stack
        if: always()
        run: docker compose down -v --remove-orphans
