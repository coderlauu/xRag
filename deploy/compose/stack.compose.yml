services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_SERVER_URL: ${STORAGE_PUBLIC_URL}
      MINIO_BROWSER_REDIRECT_URL: ${CONSOLE_PUBLIC_URL}
    expose:
      - "9000"
      - "9001"
    volumes:
      - minio_data:/data

  api:
    image: ${XRAG_API_IMAGE}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DATABASE_POOL_MAX: ${DATABASE_POOL_MAX:-10}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: ${REDIS_DB:-0}
      WORKER_QUEUE_NAME: ${WORKER_QUEUE_NAME:-document-processing}
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_PUBLIC_URL: ${STORAGE_PUBLIC_URL}
      STORAGE_REGION: ${STORAGE_REGION:-us-east-1}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-xrag}
      STORAGE_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      STORAGE_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      STORAGE_FORCE_PATH_STYLE: "true"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/api/v1/health').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 12

  api-migrate:
    image: ${XRAG_API_IMAGE}
    restart: "no"
    profiles: ["ops"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DATABASE_POOL_MAX: ${DATABASE_POOL_MAX:-10}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: ${REDIS_DB:-0}
      WORKER_QUEUE_NAME: ${WORKER_QUEUE_NAME:-document-processing}
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_PUBLIC_URL: ${STORAGE_PUBLIC_URL}
      STORAGE_REGION: ${STORAGE_REGION:-us-east-1}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-xrag}
      STORAGE_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      STORAGE_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      STORAGE_FORCE_PATH_STYLE: "true"
    command: ["node", "apps/api/dist/apps/api/src/database/migrate.js"]

  worker:
    image: ${XRAG_WORKER_IMAGE}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DATABASE_POOL_MAX: ${DATABASE_POOL_MAX:-10}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: ${REDIS_DB:-0}
      WORKER_QUEUE_NAME: ${WORKER_QUEUE_NAME:-document-processing}
      WORKER_NAME: ${WORKER_NAME:-xrag-document-worker}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-1}
      OCR_LANGUAGE: ${OCR_LANGUAGE:-chi_sim+eng}
      OCR_TIMEOUT_MS: ${OCR_TIMEOUT_MS:-30000}
      LINK_FETCH_TIMEOUT_MS: ${LINK_FETCH_TIMEOUT_MS:-20000}
      LINK_FETCH_RETRY_COUNT: ${LINK_FETCH_RETRY_COUNT:-2}
      LINK_FETCH_RETRY_BACKOFF_MS: ${LINK_FETCH_RETRY_BACKOFF_MS:-1500}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_REGION: ${STORAGE_REGION:-us-east-1}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-xrag}
      STORAGE_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      STORAGE_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      STORAGE_FORCE_PATH_STYLE: "true"

  web:
    image: ${XRAG_WEB_IMAGE}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    expose:
      - "8080"

  pgweb:
    image: sosedoff/pgweb:0.16.2
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      PGWEB_AUTH_USER: ""
      PGWEB_AUTH_PASS: ""
    command:
      [
        "--bind=0.0.0.0",
        "--listen=8081",
        "--url=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
      ]
    expose:
      - "8081"

  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    depends_on:
      web:
        condition: service_started
      pgweb:
        condition: service_started
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-xrag.coderlau.cn}
      STORAGE_PUBLIC_HOST: ${STORAGE_PUBLIC_HOST:-storage.xrag.coderlau.cn}
      CONSOLE_PUBLIC_HOST: ${CONSOLE_PUBLIC_HOST:-console.xrag.coderlau.cn}
      DB_CONSOLE_PUBLIC_HOST: ${DB_CONSOLE_PUBLIC_HOST:-db.xrag.coderlau.cn}
      DB_CONSOLE_BASICAUTH_USERNAME: ${DB_CONSOLE_BASICAUTH_USERNAME:-admin}
      DB_CONSOLE_BASICAUTH_PASSWORD_HASH: ${DB_CONSOLE_BASICAUTH_PASSWORD_HASH:-$$2y$$10$$mQhXgmqA0c/66a0ixsA9iOL02USstip1ffXy./tzGDp7TJfknHnua}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      - ${XRAG_CADDYFILE_PATH}:/etc/caddy/Caddyfile:ro

volumes:
  postgres_data:
  minio_data:
  caddy_data:
  caddy_config:
