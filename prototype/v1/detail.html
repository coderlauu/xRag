<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>xRag Prototype v1 | 详情页</title>
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body data-page="detail">
    <div class="shell">
      <header class="topbar" data-global-header></header>
      <div class="toast-stack" data-toast></div>

      <main id="detail-page" class="page-grid">
        <section class="detail-grid">
          <article class="detail-panel">
            <div class="list-card__meta">
              <span id="detail-status"></span>
              <span class="meta-dot"></span>
              <span id="detail-source"></span>
              <span class="meta-dot"></span>
              <span id="detail-imported"></span>
            </div>

            <h2 id="detail-title" class="detail-title">加载中...</h2>

            <div class="button-row">
              <button class="primary-button" id="search-by-title" type="button">按标题去搜索</button>
              <button class="secondary-button" id="retry-button" type="button" hidden>重试解析</button>
              <span class="inline-note" id="processing-note" hidden>处理中，几秒后会自动刷新状态</span>
            </div>

            <div class="note-card">
              <strong>标签</strong>
              <div id="detail-tags" class="tag-row"></div>
            </div>

            <div class="note-card">
              <strong>正文内容</strong>
              <div id="detail-content" class="detail-content"></div>
            </div>
          </article>

          <aside class="sidebar-panel">
            <div class="panel-header">
              <div>
                <p class="eyebrow">Metadata</p>
                <h3 class="section-title">文档元信息</h3>
              </div>
            </div>
            <ul class="meta-list">
              <li><span>来源方式</span><strong id="detail-origin"></strong></li>
              <li><span>文件名</span><strong id="detail-file"></strong></li>
              <li><span>原始链接</span><strong id="detail-url"></strong></li>
            </ul>

            <div class="note-card">
              <strong>标签编辑</strong>
              <form id="tag-form" class="form-grid">
                <div class="field">
                  <input id="tag-input" type="text" placeholder="输入新的标签，例如：MVP, 用户研究" />
                </div>
                <button class="secondary-button" type="submit">保存标签</button>
              </form>
            </div>

            <div class="note-card">
              <strong>流程时间线</strong>
              <ul id="detail-timeline" class="timeline"></ul>
            </div>
          </aside>
        </section>

        <section class="panel">
          <div class="panel-header">
            <div>
              <p class="eyebrow">Related</p>
              <h3 class="section-title">相关资料</h3>
            </div>
          </div>
          <div id="related-docs" class="related-grid"></div>
        </section>
      </main>
    </div>

    <script src="assets/js/seed-data.js"></script>
    <script src="assets/js/store.js"></script>
    <script src="assets/js/ui.js"></script>
    <script src="assets/js/detail.js"></script>
  </body>
</html>
