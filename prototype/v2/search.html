<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>xRag Prototype v2 | 搜索诊断</title>
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body data-page="search">
    <div class="shell">
      <header class="topbar" data-global-header></header>

      <main class="page-grid">
        <section class="hero-card">
          <p class="eyebrow">搜索诊断</p>
          <h2 class="hero-title">不仅找成功结果，也要能定位失败文档和处理中任务。</h2>
          <p class="hero-copy">
            `Phase 1B` 的搜索不再只展示“命中了什么”，还要回答“为什么还没命中、卡在了哪里、下一步该怎么处理”。
          </p>
        </section>

        <section class="panel">
          <form class="toolbar-grid" id="search-form">
            <input id="search-input" type="search" placeholder="例如：PDF / multipart / object missing / rollback" />
            <select id="filter-status">
              <option value="all">全部解析状态</option>
              <option value="success">成功</option>
              <option value="processing">处理中</option>
              <option value="failed">失败</option>
              <option value="pending">待处理</option>
            </select>
            <select id="filter-source">
              <option value="all">全部来源</option>
              <option value="pdf">PDF</option>
              <option value="file">文件</option>
              <option value="text">文本</option>
            </select>
            <select id="filter-diagnosis">
              <option value="all">全部诊断类型</option>
            </select>
            <button class="primary-button" type="submit">更新结果</button>
          </form>
        </section>

        <section class="two-column">
          <article class="panel">
            <div class="panel-header">
              <div>
                <p class="eyebrow">结果</p>
                <h3 class="section-title">搜索结果</h3>
              </div>
              <span class="inline-note" data-result-count></span>
            </div>
            <div class="list-shell" data-search-results></div>
          </article>

          <aside class="panel">
            <div class="panel-header">
              <div>
                <p class="eyebrow">检索建议</p>
                <h3 class="section-title">排查建议</h3>
              </div>
            </div>
            <div data-search-insights></div>
          </aside>
        </section>
      </main>
    </div>

    <script src="assets/js/data.js"></script>
    <script src="assets/js/ui.js"></script>
    <script src="assets/js/search.js"></script>
  </body>
</html>
